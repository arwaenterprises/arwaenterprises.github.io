<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Dawam">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background circle (filled) -->
  <circle cx="16" cy="16" r="15" fill="url(#fg)"/>

  <!-- Clock face (white) -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="white" stroke-width="1.2" opacity="0.4"/>

  <!-- Tick marks -->
  <line x1="16" y1="6"  x2="16" y2="8.5"  stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="26" y1="16" x2="23.5" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Hour hand -->
  <line x1="16" y1="16" x2="11" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="16" y1="16" x2="22" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="white"/>
</svg>
